name: Snoreline
options:
  bundleIdPrefix: com.shimondeitel.snorediary2
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Snoreline:
    type: application
    platform: iOS
    sources:
      - path: Snoreline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorediary2
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Snoreline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SnorelineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnorelineTests
      - path: Snoreline.storekit
    dependencies:
      - target: Snoreline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorediary2.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SnorelineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SnorelineUITests
    dependencies:
      - target: Snoreline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorediary2.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Snoreline:
    build:
      targets:
        Snoreline: all
        SnorelineTests: [test]
        SnorelineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Snoreline.storekit
    test:
      config: Debug
      storeKitConfiguration: Snoreline.storekit
      targets:
        - SnorelineTests
        - SnorelineUITests
    archive:
      config: Release
